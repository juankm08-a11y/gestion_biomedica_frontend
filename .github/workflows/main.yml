name: Frontend Deploy CI/CD

on:
  push:
    branches: [main]

jobs:

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build \
          --build-arg NODE_OPTIONS="--max-old-space-size=4096" \
          -t juancar08/dockerbiomedico:latest ./frontend

      - name: Push Docker Image
        run: docker push juancar08/dockerbiomedico:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1

        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |

            cd ~/gestion_biomedica_frontend/frontend

            echo "Pull new image"
            docker pull juancar08/dockerbiomedico:latest

            echo "Restart containers"
            docker-compose down
            docker-compose up -d
